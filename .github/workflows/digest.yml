name: Weekly AI Digest

on:
  schedule:
    - cron: '0 8 * * 1'      # every Monday 08:00 UTC (change if you need another day)
  workflow_dispatch:
    inputs:
      debug:
        description: "Dump generated HTML to the Action log"
        required: false
        default: "false"
permissions:
  contents: write

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    env:
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      SMTP_EMAIL:      ${{ secrets.SMTP_EMAIL }}
      SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
      OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}      # optional
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      NEWS_API_KEY:    ${{ secrets.NEWS_API_KEY }}      # optional
      GIT_PAT: ${{ secrets.GIT_PAT }}                  # <-- the PAT you just created

    steps:
      # ----------------------------------------------------
      # 0️⃣ Checkout with full history (required for push)
      # ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # fetch all commits so we can push later

      # ----------------------------------------------------
      # 1️⃣ Set up Python
      # ----------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------------------------------
      # 2️⃣ Install dependencies
      # ----------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------------------------------
      # 3️⃣ Run the digest script (debug flag from manual run)
      # ----------------------------------------------------
      - name: Run digest
        env:
          DEBUG_MODE: ${{ github.event.inputs.debug }}
        run: python digest.py

      # ----------------------------------------------------
      # 4️⃣ Commit updated sent_ids.json (push back to repo)
      # ----------------------------------------------------
      - name: Commit updated sent_ids.json
        if: always()                     # run even if the email step fails
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}
        run: |
          # Configure a generic bot identity
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          # Only commit if the file actually changed
          if git diff --quiet sent_ids.json; then
            echo "sent_ids.json unchanged – nothing to commit."
            exit 0
          fi

          git add sent_ids.json
          git commit -m "Update sent_ids.json (auto‑generated by AI‑Digest)"

          # Push using the PAT (the token is masked in logs)
          git push https://x-access-token:${GIT_PAT}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}

      # ----------------------------------------------------
      # 5️⃣ (Optional) Show generated HTML when debugging
      # ----------------------------------------------------
      - name: Show generated HTML (debug)
        if: ${{ env.DEBUG_MODE == 'true' }}
        run: |
          echo "===== DEBUG: GENERATED HTML START ====="
          cat generated.html   # the script writes HTML here only when DEBUG_MODE is true
          echo "===== DEBUG: GENERATED HTML END ====="
