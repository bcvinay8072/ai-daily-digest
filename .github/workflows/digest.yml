name: Weekly AI Digest

# ------------------------------------------------------------
# 1️⃣ Run every Monday at 08:00 UTC (change if you prefer another day)
# ------------------------------------------------------------
on:
  schedule:
    - cron: '0 8 * * 1'          # Monday 08:00 UTC
  workflow_dispatch:            # still allow manual runs
    inputs:
      debug:
        description: "Dump generated HTML to the Action log"
        required: false
        default: "false"

jobs:
  build-and-send:
    runs-on: ubuntu-latest
    env:
      # ---- non‑secret configuration (read from .env) ----
      # You can keep the same .env you already have.
      # No need to repeat them here – the script reads the file.

      # ---- secrets (must exist in Settings → Secrets → Actions) ----
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      SMTP_EMAIL:      ${{ secrets.SMTP_EMAIL }}
      SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
      OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}   # optional
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      NEWS_API_KEY:    ${{ secrets.NEWS_API_KEY }}     # optional
      GIT_PAT:         ${{ secrets.GIT_PAT }}

    steps:
      # ----------------------------------------------------
      # 0️⃣ Checkout repository (including .env & sent_ids.json)
      # ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # required because we will commit later

      # ----------------------------------------------------
      # 1️⃣ Set up Python
      # ----------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------------------------------
      # 2️⃣ Install dependencies
      # ----------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------------------------------
      # 3️⃣ Run the digest (debug flag comes from workflow_dispatch)
      # ----------------------------------------------------
      - name: Run digest
        env:
          DEBUG_MODE: ${{ github.event.inputs.debug }}
        run: python digest.py

      # ----------------------------------------------------
      # 4️⃣ Commit the updated sent_ids.json (push back to repo)
      # ----------------------------------------------------
      - name: Commit updated sent_ids.json
        if: always()                      # run even if earlier step failed
        env:
          GIT_PAT: ${{ secrets.GIT_PAT }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          # If the file changed, commit and push
          if ! git diff --quiet sent_ids.json; then
            git add sent_ids.json
            git commit -m "Update sent_ids.json (auto‑generated by AI‑digest)"
            git push https://x-access-token:${GIT_PAT}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
          else
            echo "sent_ids.json unchanged – nothing to commit."
          fi

      # ----------------------------------------------------
      # 5️⃣ (Optional) Show HTML in the log when debug is true
      # ----------------------------------------------------
      - name: Show generated HTML (debug)
        if: ${{ env.DEBUG_MODE == 'true' }}
        run: |
          echo "===== DEBUG: GENERATED HTML START ====="
          cat generated.html   # the script writes the HTML to this file only in debug mode
          echo "===== DEBUG: GENERATED HTML END ====="
