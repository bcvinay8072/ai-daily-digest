name: Daily AI Digest

# ------------------------------------------------------------
# 1️⃣ Triggers
# ------------------------------------------------------------
on:
  # automatic daily run (08:00 UTC)
  schedule:
    - cron: '0 8 * * *'

  # manual run from the UI – useful for testing / debugging
  workflow_dispatch:
    inputs:
      debug:
        description: "Dump generated HTML to the Action log (debug mode)"
        required: false
        default: "false"

# ------------------------------------------------------------
# 2️⃣ Job definition
# ------------------------------------------------------------
jobs:
  build-and-send:
    runs-on: ubuntu-latest
    env:
      # ---------- Environment variables (read from .env in the repo)
      # (These are **not** secrets – they can be changed without touching code.)
      # Example values – you can edit .env in the repo to change them.
      # MAX_ITEMS=12            # how many stories end up in the mail
      # KEYWORDS=llm,gpt,reinforcement,diffusion,multimodal
      # SOURCE_WEIGHTS=techcrunch=2.0;verge=1.5;arxiv=2.5;hn=0.8;reddit=0.6
      # INCLUDE_IMAGES=true
      # DEBUG_MODE=false
      # NEWSAPI_POP_FACTOR=0.3

      # ---------- Secrets (set in repo Settings → Secrets → Actions)
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
      SMTP_EMAIL:      ${{ secrets.SMTP_EMAIL }}
      SMTP_PASSWORD:   ${{ secrets.SMTP_PASSWORD }}
      OPENAI_API_KEY:  ${{ secrets.OPENAI_API_KEY }}   # optional
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      NEWS_API_KEY:    ${{ secrets.NEWS_API_KEY }}     # optional
      # Personal Access Token with repo write permission (used only for committing sent_ids.json)
      GIT_PAT:         ${{ secrets.GIT_PAT }}

    steps:
      # ----------------------------------------------------
      # 1️⃣ Checkout the repository (includes .env, digest.py, etc.)
      # ----------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch the entire history because we will commit back a changed file
          fetch-depth: 0

      # ----------------------------------------------------
      # 2️⃣ Set up Python (3.11)
      # ----------------------------------------------------
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------------------------------
      # 3️⃣ Install Python dependencies
      # ----------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ----------------------------------------------------
      # 4️⃣ Run the digest script
      # ----------------------------------------------------
      - name: Run digest (with optional debug)
        env:
          DEBUG_MODE: ${{ github.event.inputs.debug }}   # true/false from manual run
        run: |
          # The script itself reads .env + the environment variables above.
          python digest.py
          
      # ----------------------------------------------------
      # 6️⃣ OPTIONAL – Show the generated HTML in the log (debug mode)
      # ----------------------------------------------------
      - name: Show HTML (debug)
        if: ${{ env.DEBUG_MODE == 'true' }}
        run: |
          echo "===== DEBUG: GENERATED HTML START ====="
          cat generated.html   # <‑‑ the script writes the HTML to this file when DEBUG_MODE is true
          echo "===== DEBUG: GENERATED HTML END ====="
